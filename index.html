<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tile Generator</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #111;
      color: #f4f4f4;
    }

    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      gap: 1rem;
      padding: 1rem;
      box-sizing: border-box;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    button {
      background: #2563eb;
      border: none;
      color: white;
      padding: 0.6rem 1rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    button.secondary {
      background: #1f2937;
    }

    button.secondary.active {
      background: #2563eb;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    button:hover:not(:disabled) {
      background: #1d4ed8;
    }

    .canvas-wrapper {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      flex: 1;
    }

    canvas {
      width: 100%;
      height: 100%;
      background: #0d0d0d;
      border-radius: 12px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
    }

    .panel-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .hint {
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
  <script src="./libs/FileSaver.js"></script>
</head>
<body>
  <header>
    <button id="add-tile">Add Tile</button>
    <button id="toggle-elevation" class="secondary">Toggle Elevation Mode</button>
    <button id="toggle-noise" class="secondary">Generate Noise Map</button>
    <button id="export-json" class="secondary">Export Seed Coordinates</button>
    <span class="hint">Drag circles to move tiles · Drag balloons to change elevation · Double click a label to rename · Press Delete to remove selected tile.</span>
  </header>
  <div class="canvas-wrapper">
    <div>
      <div class="panel-title">Voronoi Editor</div>
      <canvas id="voronoi-canvas"></canvas>
    </div>
    <div>
      <div class="panel-title">Noise Simulation Preview</div>
      <canvas id="noise-canvas"></canvas>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
